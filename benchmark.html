<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loxi WASM Benchmark</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.5;
        }

        pre {
            background: #f4f4f4;
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
        }

        button {
            padding: 0.5rem 1rem;
            background: #0070f3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            background: #0051a2;
        }

        .status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 4px;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>
    <h1>Loxi (vrp-rs) Browser Benchmark</h1>
    <p>This page loads the WebAssembly module and solves a VRP problem using the new <code>vrp-rs</code> integration.
    </p>

    <div style="margin-bottom: 2rem;">
        <button id="runBtn">Run Benchmark</button>
    </div>

    <div id="status" class="status" style="display: none;"></div>

    <h3>Output Log:</h3>
    <pre id="log" style="height: 300px; overflow-y: scroll;">Waiting for user input...</pre>

    <script type="module">
        import init, { solve_route } from './pkg/loxi_wasm.js';

        const logEl = document.getElementById('log');
        const statusEl = document.getElementById('status');

        function log(msg) {
            logEl.textContent += msg + '\n';
            logEl.scrollTop = logEl.scrollHeight;
            console.log(msg);
        }

        async function run() {
            try {
                statusEl.style.display = 'none';
                log('Initializing WASM module...');
                await init();
                log('WASM module loaded successfully.');

                // Example Problem (Loxi Format)
                const problem = {
                    vehicle: {
                        start_location: { lat: -34.6037, lon: -58.3816 }, // Obelisco
                        end_location: { lat: -34.6037, lon: -58.3816 },
                        shift_window: { start: 28800, end: 64800 }, // 8am - 6pm
                        capacity: 100,
                        speed_mps: 10.0
                    },
                    // Stops
                    stops: [
                        {
                            id: "stop1",
                            location: { lat: -34.5997, lon: -58.3732 }, // Galerias Pacifico
                            demand: 10,
                            time_window: { start: 36000, end: 40000 },
                            service_time: 300,
                            priority: 1
                        },
                        {
                            id: "stop2",
                            location: { lat: -34.5878, lon: -58.3976 }, // Recoleta Mall
                            demand: 15,
                            time_window: { start: 38000, end: 45000 },
                            service_time: 300,
                            priority: 1
                        },
                        {
                            id: "stop3",
                            location: { lat: -34.6355, lon: -58.3648 }, // La Boca
                            demand: 20,
                            time_window: { start: 30000, end: 60000 },
                            service_time: 300,
                            priority: 1
                        }
                    ]
                };

                log('Input Problem: ' + JSON.stringify(problem, null, 2));
                log('\nRunning Solver...');

                const startTime = performance.now();
                const solutionJson = solve_route(JSON.stringify(problem));
                const endTime = performance.now();

                const solution = JSON.parse(solutionJson);

                log('\n✅ Solution Found in ' + (endTime - startTime).toFixed(2) + 'ms');
                log('Cost: ' + solution.cost);
                log('Route: ' + JSON.stringify(solution.route, null, 2));

                statusEl.textContent = 'Benchmark Passed! Solution cost: ' + solution.cost;
                statusEl.className = 'status success';
                statusEl.style.display = 'block';

            } catch (e) {
                log('❌ Error: ' + e);
                statusEl.textContent = 'Error: ' + e;
                statusEl.className = 'status error';
                statusEl.style.display = 'block';
            }
        }

        document.getElementById('runBtn').addEventListener('click', run);
    </script>
</body>

</html>
