name: E2E

on:
  pull_request:

jobs:
  e2e:
    name: Playwright smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build node binary
        run: cargo build --manifest-path protocol/Cargo.toml -p loxi-cli --release

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/worker-web/package-lock.json

      - name: Install worker-web dependencies
        run: npm ci
        working-directory: apps/worker-web

      - name: Install Playwright + browsers
        run: |
          npm ci
          npx playwright install chromium --with-deps
        working-directory: tests/e2e

      - name: Start Loxi node (background)
        run: bash scripts/run_node.sh > /tmp/loxi-node.log 2>&1 &
        env:
          RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
          RSA_PUBLIC_KEY: ${{ secrets.RSA_PUBLIC_KEY }}

      - name: Start worker-web (background)
        run: npm run dev -- --host > /tmp/worker-web.log 2>&1 &
        working-directory: apps/worker-web

      - name: Wait for services
        run: |
          echo "Waiting for orchestrator..."
          timeout 60 bash -c 'until curl -sf http://localhost:8080/workers/count; do sleep 2; done'
          echo "Waiting for worker-web..."
          timeout 90 bash -c 'until curl -sf http://localhost:5173; do sleep 2; done'

      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "=== loxi-node ===" && cat /tmp/loxi-node.log || true
          echo "=== worker-web ===" && cat /tmp/worker-web.log || true

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: tests/e2e

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: tests/e2e/playwright-report/
          retention-days: 7
